name: 🚀 Tamil Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 🐳 Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build Docker Image
      - name: Build Image
        run: |
          docker build -t dockerimaggar/tamil-movie-backend:latest .

      # 🚀 Push to Docker Hub
      - name: Push Image
        run: |
          docker push dockerimaggar/tamil-movie-backend:latest